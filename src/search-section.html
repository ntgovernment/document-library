<!--
    search-section.html — DCDD Document Library: Search Input Component
    ════════════════════════════════════════════════════════════════════

    OVERVIEW
    ────────
    Standalone search input widget used on the DCDD intranet document
    search page. Submits a GET request to the current page URL with the
    user's query appended as ?searchterm=<value>.

    This fragment is intended to be embedded (server-side include or CMS
    include) at the top of the page that also contains search-results.html.
    Both fragments must exist on the same page for the full search
    experience to work.

    SUBMIT BEHAVIOUR
    ────────────────
    • method="get" action="" → navigates to
        <current pathname>?searchterm=<encoded value>
    • coveo-search.js intercepts the #policy-search-form submit event and
      performs the same redirect via JS (fresh page load), allowing it to
      reset state cleanly. If JS is unavailable the native form submit
      still works.
    • Pressing ENTER inside the text field triggers submit natively because
      the <button type="submit"> is inside the same <form>.

    URL PARAMETER
    ─────────────
    Input name="searchterm" produces ?searchterm=<value> in the URL.
    On page load, coveo-search.js reads ?searchterm= to pre-fill the
    input and immediately run the search.

    DOM CONTRACT — IDs required by coveo-search.js
    ───────────────────────────────────────────────
    #policy-search-form   The <form> element. JS attaches a submit handler
                          here to intercept and redirect.
    #search               The <input> element. JS reads .val() for the query
                          and sets it when pre-filling from the URL on load.

    ACCESSIBILITY
    ─────────────
    • <label class="sr-only" for="search"> provides a visible-to-screen-
      reader label without displaying text on screen.
    • <button aria-label="Search"> labels the icon-only submit button.

    STYLING
    ───────
    BEM classes from src/css/search-widget.css:
      .ntgc-search-section              outer section wrapper
      .ntgc-search-section__container   centring/max-width container
      .ntgc-search-section__input-wrapper  styled input shell
        data-state="Default"            controls focus/hover variant styles
        data-variant="Secondary"        selects the colour theme variant
      .ntgc-search-section__input-field    flex row: input + button
      .ntgc-search-section__text-input     the visible text input
      .ntgc-search-section__submit-btn     icon submit button
      .ntgc-search-section__icon-container icon wrapper
        data-colour="Black"             icon colour token
      .ntgc-search-section__icon           Font Awesome search icon (fal fa-search)

    DEPENDENCIES
    ────────────
    • Font Awesome (fal fa-search icon class) must be loaded on the page.
    • coveo-search.js (src/js/coveo-search.js) must be loaded on the page
      for the JS-driven submit redirect and pre-fill behaviour.
    • jQuery must be loaded before coveo-search.js.

    RELATED FILES
    ─────────────
    src/search-results.html   — results, filters, pagination, sort UI
    src/js/coveo-search.js    — all search logic; documents full DOM contract
    src/css/search-widget.css — component styles
-->
<form action="" method="get" autocomplete="off" id="policy-search-form" name="policy-search-form">
    <div class="ntgc-search-section">
        <div class="ntgc-search-section__container">
            <div class="ntgc-search-section__input-wrapper" data-state="Default" data-variant="Secondary">
                <div class="ntgc-search-section__input-field">
                    <label class="sr-only" for="search">Search</label>
                    <input type="text" name="searchterm" id="search" class="ntgc-search-section__text-input"
                        placeholder="Enter your search terms" value="">
                    <button class="ntgc-search-section__submit-btn" type="submit" aria-label="Search">
                        <div class="ntgc-search-section__icon-container" data-colour="Black">
                            <span class="fal fa-search ntgc-search-section__icon"></span>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
