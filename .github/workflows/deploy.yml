name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/collection
          mkdir -p _site/src/vendor/css _site/src/vendor/js _site/src/vendor/img
          mkdir -p _site/src/css _site/src/js _site/src/mock

          cp index.html .nojekyll _site/

          # Collection pages (generated by build script)
          cp collection/*.html _site/collection/ 2>/dev/null || true

          # Vite build output
          cp -r dist _site/

          # Vendor CSS + JS (referenced by generated HTML)
          cp src/vendor/css/* _site/src/vendor/css/
          cp src/vendor/js/*  _site/src/vendor/js/
          cp src/vendor/img/* _site/src/vendor/img/ 2>/dev/null || true

          # Site CSS used by the NTG chrome
          cp src/css/main.css src/css/status-toolbar.css _site/src/css/

          # Site JS used by the NTG chrome
          cp src/js/components.js  _site/src/js/
          cp src/js/global-v2.js   _site/src/js/
          cp src/js/profile-menu.js _site/src/js/
          cp src/js/status-toolbar.js _site/src/js/

          # Mock data for Coveo API (used on GitHub Pages instead of intranet API)
          cp src/mock/coveo-search-rest-api-query.json _site/src/mock/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
