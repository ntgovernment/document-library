<div class="doc-search-outer">
    <div class="doc-search-layout">

        <!-- Results column -->
        <div class="doc-search-results-col" data-view="card" id="doc-search-results-col">

            <!-- Loading spinner -->
            <div class="doc-search-spinner d-none" role="status" id="initialLoadingSpinner">
                <span class="doc-search-spinner__ring" aria-hidden="true"></span>
                <span>Loading search results…</span>
            </div>

            <!-- User message -->
            <div class="doc-search-user-message" id="doc-search-user-message"></div>

            <!-- Mobile filter button (hidden on desktop) -->
            <button type="button" class="doc-search-mobile-filter-btn" id="doc-search-mobile-filter-btn"
                aria-label="Open filters" aria-expanded="false" aria-controls="doc-search-drawer">
                <span class="doc-search-mobile-filter-btn__left">
                    <svg class="doc-search-mobile-filter-btn__icon" aria-hidden="true" width="20" height="20"
                        viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 4h18M5 10h10M9 16h2" stroke="currentColor" stroke-width="1.75"
                            stroke-linecap="round" />
                    </svg>
                    <span class="doc-search-mobile-filter-btn__label">Filters</span>
                </span>
                <svg class="doc-search-mobile-filter-btn__chevron" aria-hidden="true" width="16" height="16"
                    viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>

            <!-- Results header -->
            <div class="doc-search-results-header">
                <p class="doc-search-results-summary" id="doc-search-results-summary"></p>
                <div class="doc-search-results-controls">
                    <button type="button" class="doc-search-view-toggle" id="doc-search-view-toggle"
                        aria-pressed="false" aria-label="Toggle table view">
                        <span class="doc-search-view-toggle__pill"></span>
                        <span class="doc-search-view-toggle__label">Table view</span>
                    </button>
                </div>
            </div>

            <!-- Card results list -->
            <ul class="doc-search-results-list" id="doc-search-results-list" role="list"></ul>

            <!-- Table results -->
            <div class="doc-search-table-wrap">
                <table class="doc-search-table" id="doc-search-table">
                    <thead>
                        <tr>
                            <th class="doc-search-table__col-title">Title</th>
                            <th class="doc-search-table__col-updated">Last Updated</th>
                            <th class="doc-search-table__col-type">Type</th>
                            <th class="doc-search-table__col-collection">Collection</th>
                        </tr>
                    </thead>
                    <tbody id="doc-search-table-body"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav class="doc-search-pagination" id="doc-search-pagination" aria-label="Search results pages"></nav>

        </div><!-- /.doc-search-results-col -->

        <!-- Filter sidebar -->
        <aside class="doc-search-sidebar" id="doc-search-sidebar" aria-label="Filter results">
            <div class="doc-search-filter-group">
                <button type="button" class="doc-search-filter-group__toggle" aria-expanded="false"
                    aria-controls="doc-search-sort-group">
                    <span>Sort by</span>
                    <svg class="doc-search-filter-group__chevron" aria-hidden="true" width="16" height="16"
                        viewBox="61.5 9.3 13 7" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M67.5967 15.353C67.8181 15.5468 68.1824 15.5468 68.4038 15.353L74.1181 10.353C74.3395 10.1593 74.3395 9.84053 74.1181 9.64678C73.8967 9.45303 73.5324 9.45303 73.311 9.64678L68.0002 14.2937L62.6895 9.64678C62.4681 9.45303 62.1038 9.45303 61.8824 9.64678C61.661 9.84053 61.661 10.1593 61.8824 10.353L67.5967 15.353Z" />
                    </svg>
                </button>
                <div class="doc-search-sort-group" role="radiogroup" aria-label="Sort results by"
                    id="doc-search-sort-group">
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-sort" value="relevancy" checked>
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Relevance</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-sort" value="date descending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Last updated</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-sort" value="alpha ascending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">A – Z</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-sort" value="alpha descending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Z – A</span>
                    </label>
                </div>
            </div>
            <div class="doc-search-filter-group">
                <h3 class="doc-search-filter-group__title">Type</h3>
                <ul class="doc-search-facet-list" id="doc-search-type-filters" role="group"
                    aria-label="Filter by document type"></ul>
            </div>
            <div class="doc-search-filter-group">
                <h3 class="doc-search-filter-group__title">Category</h3>
                <ul class="doc-search-facet-list" id="doc-search-category-filters" role="group"
                    aria-label="Filter by category"></ul>
            </div>
        </aside>

    </div><!-- /.doc-search-layout -->

    <!-- Mobile filter drawer overlay -->
    <div class="doc-search-drawer-overlay" id="doc-search-drawer-overlay" aria-hidden="true"></div>

    <!-- Mobile filter drawer -->
    <div class="doc-search-drawer" id="doc-search-drawer" role="dialog" aria-modal="true" aria-label="Filters"
        aria-hidden="true">

        <!-- Drawer header -->
        <div class="doc-search-drawer__header">
            <span class="doc-search-drawer__title">Filters</span>
            <button type="button" class="doc-search-drawer__close" id="doc-search-drawer-close"
                aria-label="Close filters">
                <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>

        <!-- Drawer body (scrollable) -->
        <div class="doc-search-drawer__body">
            <div class="doc-search-filter-group">
                <button type="button" class="doc-search-filter-group__toggle" aria-expanded="false"
                    aria-controls="doc-search-drawer-sort-group">
                    <span>Sort by</span>
                    <svg class="doc-search-filter-group__chevron" aria-hidden="true" width="16" height="16"
                        viewBox="61.5 9.3 13 7" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M67.5967 15.353C67.8181 15.5468 68.1824 15.5468 68.4038 15.353L74.1181 10.353C74.3395 10.1593 74.3395 9.84053 74.1181 9.64678C73.8967 9.45303 73.5324 9.45303 73.311 9.64678L68.0002 14.2937L62.6895 9.64678C62.4681 9.45303 62.1038 9.45303 61.8824 9.64678C61.661 9.84053 61.661 10.1593 61.8824 10.353L67.5967 15.353Z" />
                    </svg>
                </button>
                <div class="doc-search-sort-group" role="radiogroup" aria-label="Sort results by"
                    id="doc-search-drawer-sort-group">
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-drawer-sort" value="relevancy" checked>
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Relevance</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-drawer-sort" value="date descending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Last updated</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-drawer-sort" value="alpha ascending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">A – Z</span>
                    </label>
                    <label class="doc-search-sort-option">
                        <input type="radio" name="doc-search-drawer-sort" value="alpha descending">
                        <span class="doc-search-sort-option__radio" aria-hidden="true"></span>
                        <span class="doc-search-sort-option__label">Z – A</span>
                    </label>
                </div>
            </div>
            <div class="doc-search-filter-group">
                <h3 class="doc-search-filter-group__title">Type</h3>
                <ul class="doc-search-facet-list" id="doc-search-drawer-type-filters" role="group"
                    aria-label="Filter by document type"></ul>
            </div>
            <div class="doc-search-filter-group">
                <h3 class="doc-search-filter-group__title">Category</h3>
                <ul class="doc-search-facet-list" id="doc-search-drawer-category-filters" role="group"
                    aria-label="Filter by category"></ul>
            </div>
            <button type="button" class="doc-search-drawer__clear" id="doc-search-drawer-clear">
                Clear all filters
            </button>
        </div>

        <!-- Drawer footer -->
        <div class="doc-search-drawer__footer">
            <button type="button" class="doc-search-drawer__apply" id="doc-search-drawer-apply">
                Apply filters
            </button>
        </div>

    </div><!-- /.doc-search-drawer -->

</div><!-- /.doc-search-outer -->

<!-- Result card template (hidden — cloned per result by coveo-search.js) -->
<li class="doc-search-result search-template" hidden>
    <a class="doc-search-result__title-link" href="#" data-ref="search-result-link">
        <span data-ref="search-result-title"></span>
        <svg class="doc-search-result__ext-icon" data-ref="search-result-extlink" hidden aria-hidden="true" width="12"
            height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
    </a>
    <p class="doc-search-result__description" data-ref="search-result-description"></p>
    <div class="doc-search-result__collection-row" data-ref="search-result-collection-row">
        <svg class="doc-search-result__collection-icon" aria-hidden="true" width="12" height="12" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        Collection: <a class="doc-search-result__collection-link" href="#"
            data-ref="search-result-collection-link"><span data-ref="search-result-collection"></span></a>
    </div>
    <div class="doc-search-result__meta">
        <span class="doc-search-result__tag" data-ref="search-result-doctype"></span>
        <div class="doc-search-result__updated">Last updated: <span data-ref="search-result-last-updated"></span></div>
    </div>
</li>
